  <style>
    @import url('https://fonts.googleapis.com/css2?family=Geist+Mono:wght@300;400;500;600;700&display=swap');

    /* Premium Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--ring);
      border-radius: var(--radius);
      border: 2px solid transparent;
      background-clip: content-box;
    }

    html.dark ::-webkit-scrollbar-thumb {
      background: var(--ring);
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--muted-foreground);
    }

    html.dark ::-webkit-scrollbar-thumb:hover {
      background: var(--muted-foreground);
    }

    /* Hide Scrollbar Utility */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    /* Ultra-thin Scrollbar */
    .thin-scrollbar {
      scrollbar-width: thin;
      scrollbar-color: transparent transparent;
    }

    .thin-scrollbar:hover {
      scrollbar-color: color-mix(in srgb, var(--ring) 40%, transparent) transparent;

    }

      -webkit-font-smoothing: antialiased;

      overscroll-behavior-x: none;

    }

    html.dark body {
      background-color: var(--background);
      color: var(--foreground);
    }

    .instant-app-bg {
      background:
        radial-gradient(circle at 50% 18%, color-mix(in srgb, var(--foreground) 8%, transparent), transparent 32%),
        linear-gradient(90deg, color-mix(in srgb, var(--border) 42%, transparent) 1px, transparent 1px),
        linear-gradient(color-mix(in srgb, var(--border) 42%, transparent) 1px, transparent 1px),
        var(--background);
      background-size: auto, 40px 40px, 40px 40px, auto;
    }

    .effect-orbit-button {
      isolation: isolate;
    }

    .effect-orbit-button::before {
      content: "";
      position: absolute;
      inset: -1px;
      border-radius: inherit;
      padding: 1px;
      pointer-events: none;
      background: conic-gradient(from 0deg,
          transparent 0deg 276deg,
          rgba(255, 255, 255, 0.62) 292deg,
          transparent 314deg 360deg);
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      mask-composite: exclude;
      opacity: 0.72;
      animation: effectOrbitLine 3.4s linear infinite;
    }

    @keyframes effectOrbitLine {
      to {
        transform: rotate(1turn);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }

      .effect-orbit-button::before {

      }
    }

    .auth-shell .auth-unicorn {

      mix-blend-mode: multiply;
    }

      opacity: 0.65;
      mix-blend-mode: normal;

    .auth-ambient {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      background:

      aspect-ratio: 1;
      border: 1px solid color-mix(in srgb, var(--ring) 48%, transparent);

      opacity: 0.75;
      animation: authOrbFloat 9s ease-in-out infinite alternate;

    .auth-orb-one {

      left: -10%;
    }

    .auth-orb-two {
      right: -14%;
      bottom: -22%;
      animation-delay: -3s;
    }

    .auth-grid {
      position: absolute;
      inset: 0;
      background: linear-gradient(110deg, transparent 20%, color-mix(in srgb, var(--foreground) 8%, transparent) 50%, transparent 80%);
      transform: translateX(-120%);
      animation: authSweep 4.8s ease-in-out infinite;
    }

    .auth-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-top: 1px solid color-mix(in srgb, var(--foreground) 12%, transparent);
      pointer-events: none;
    }

    .auth-vignette-center,
    .auth-vignette-bottom {
      position: absolute;
      pointer-events: none;
      inset: 0;
    }

    .auth-vignette-center {
      background: radial-gradient(circle at center, transparent 0%, color-mix(in srgb, var(--background) 86%, transparent) 72%);

    .auth-vignette-bottom {
      top: auto;
      height: 50%;
      background: linear-gradient(to top, var(--background), color-mix(in srgb, var(--background) 68%, transparent), transparent);
    }

    @keyframes authGridDrift {
      from {
        background-position: center, 0 0, 0 0;
      }
      to {
        background-position: center, 44px 0, 0 44px;
      }
    }

    @keyframes authOrbFloat {
      from {
        transform: translate3d(0, 0, 0) scale(1);
      }
      to {
        transform: translate3d(6%, -4%, 0) scale(1.08);
      }
    }

    @keyframes authSweep {
      0%, 42% {
        transform: translateX(-120%);
        opacity: 0;
      }
      55% {
        opacity: 1;
      }
      100% {
        transform: translateX(120%);
        opacity: 0;
      }
