<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SaaS Val.</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%234f46e5' stroke='none'%3E%3Cpath d='M21 16V8l-9-5-9 5v8l9 5 9-5z'/%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdn.jsdelivr.net/npm/reactflow@11.10.1/dist/style.min.css" rel="stylesheet"
    crossorigin="anonymous">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Outfit', 'Inter', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
          colors: {
            border: "hsl(var(--border))",
            background: "hsl(var(--background))",
            foreground: "hsl(var(--foreground))",
          },
          animation: {
            'fade-in': 'fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
            'slide-in': 'slideIn 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
            'slide-up': 'slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1)',
            'slide-in-right': 'slideInRight 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
            'slide-in-left': 'slideInLeft 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
            'slide-in-bottom': 'slideInBottom 0.5s cubic-bezier(0.16, 1, 0.3, 1)',
            'scale-in': 'scaleIn 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
            'blur-in': 'blurIn 0.6s cubic-bezier(0.16, 1, 0.3, 1)',
            'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'shimmer': 'shimmer 2.5s linear infinite',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideIn: {
              '0%': { transform: 'translateX(-20px)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' },
            },
            slideUp: {
              '0%': { transform: 'translateY(20px)', opacity: '0' },
              '100%': { transform: 'translateY(0)', opacity: '1' },
            },
            shimmer: {
              '0%': { backgroundPosition: '-200% 0' },
              '100%': { backgroundPosition: '200% 0' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-10px)' },
            },
            slideInRight: {
              '0%': { transform: 'translateX(100%)', opacity: '0' },
              '100%': { transform: 'translateX(0)', opacity: '1' },
            },
            slideInLeft: {
              '0%': { transform: 'translateX(-30px)', opacity: '0', filter: 'blur(10px)' },
              '100%': { transform: 'translateX(0)', opacity: '1', filter: 'blur(0px)' },
            },
            slideInBottom: {
              '0%': { transform: 'translateY(30px)', opacity: '0', filter: 'blur(10px)' },
              '100%': { transform: 'translateY(0)', opacity: '1', filter: 'blur(0px)' },
            },
            scaleIn: {
              '0%': { transform: 'scale(0.95)', opacity: '0', filter: 'blur(8px)' },
              '100%': { transform: 'scale(1)', opacity: '1', filter: 'blur(0px)' },
            },
            blurIn: {
              '0%': { opacity: '0', filter: 'blur(20px)' },
              '100%': { opacity: '1', filter: 'blur(0px)' },
            }
          }
        },
      },
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap');

    :root {
      --glass-border: rgba(0, 0, 0, 0.08);
      --glass-bg: rgba(255, 255, 255, 0.7);
      --glass-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
    }

    html.dark {
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-bg: rgba(9, 9, 11, 0.6);
      --glass-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }

    /* Premium Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #d4d4d8;
      border-radius: 10px;
      border: 2px solid transparent;
      background-clip: content-box;
    }

    html.dark ::-webkit-scrollbar-thumb {
      background: #27272a;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #a1a1aa;
    }

    html.dark ::-webkit-scrollbar-thumb:hover {
      background: #52525b;
    }

    /* Hide Scrollbar Utility */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }

    .no-scrollbar {
      -ms-overflow-style: none;
      /* IE and Edge */
      scrollbar-width: none;
      /* Firefox */
    }

    body {
      background-color: #f8fafc;
      /* Light Mode Default */
      color: #09090b;
      font-family: 'Outfit', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      /* App handles scroll */
      transition: background-color 0.3s ease;
    }

    html.dark body {
      background-color: #000000;
      color: #f4f4f5;
    }

    /* Utility: Masked Gradient for scrolling lists */
    .mask-gradient {
      mask-image: linear-gradient(to right, transparent, black 10%, black 90%, transparent);
    }

    .mask-gradient-y {
      mask-image: linear-gradient(to bottom, transparent, black 5%, black 95%, transparent);
    }

    /* Utility: Glass Card Premium */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .glass:hover {
      border-color: rgba(139, 92, 246, 0.3);
      /* Violet hint on hover */
      transform: translateY(-2px);
      box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.1);
    }

    html.dark .glass:hover {
      border-color: rgba(255, 255, 255, 0.15);
      box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.5);
    }

    /* Utility: Animated Border Shimmer */
    .animate-border-shimmer {
      position: relative;
      overflow: hidden;
    }

    .animate-border-shimmer::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
      transition: 0.5s;
    }

    html.dark .animate-border-shimmer::before {
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
    }

    .animate-border-shimmer:hover::before {
      left: 100%;
    }

    /* Custom Stagger Delays */
    .delay-100 {
      animation-delay: 100ms;
    }

    .delay-200 {
      animation-delay: 200ms;
    }

    .delay-300 {
      animation-delay: 300ms;
    }

    .delay-500 {
      animation-delay: 500ms;
    }

    /* Mobile Responsive Utilities */
    @media (max-width: 767px) {
      .mobile-hidden {
        display: none !important;
      }

      .mobile-full-width {
        width: 100% !important;
        max-width: 100% !important;
      }
    }

    @media (min-width: 768px) {
      .desktop-hidden {
        display: none !important;
      }
    }

    /* Mobile Sidebar Overlay */
    .mobile-sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(4px);
      z-index: 35;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
    }

    .mobile-sidebar-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }

    /* Touch-friendly Targets */
    @media (max-width: 767px) {

      button,
      a,
      input,
      select,
      textarea {
        min-height: 44px;
      }

      .touch-target {
        min-width: 44px;
        min-height: 44px;
      }
    }

    /* Mobile Navigation */
    .mobile-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 64px;
      background: rgba(0, 0, 0, 0.95);
      backdrop-filter: blur(20px);
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      z-index: 40;
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 0 8px;
    }

    html.light .mobile-nav {
      background: rgba(255, 255, 255, 0.95);
      border-top: 1px solid rgba(0, 0, 0, 0.08);
    }

    .mobile-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px 12px;
      border-radius: 12px;
      transition: all 0.2s ease;
    }

    .mobile-nav-item.active {
      background: rgba(255, 255, 255, 0.1);
    }

    html.light .mobile-nav-item.active {
      background: rgba(0, 0, 0, 0.05);
    }

    .mobile-nav-item span {
      font-size: 10px;
      font-weight: 500;
    }

    /* Safe area for bottom nav */
    @media (max-width: 767px) {
      .mobile-bottom-padding {
        padding-bottom: 80px !important;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
